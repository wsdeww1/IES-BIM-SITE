<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>IES Admin — Control Panel</title>
<style>
@font-face{font-family:'Noto Sans';src:url('../fonts/Noto Sans Regular.ttf') format('truetype');font-weight:400;font-display:swap}
:root{
  --teal:#3B6C70;--teal-mid:#518D95;--teal-dark:#2d5356;--teal-deeper:#1e3d40;
  --gold:#F2DA92;--gold-dark:#d4b85e;
  --grey:#CCCCCC;--bg:#f4f6f6;--white:#fff;--dark:#2A2A2A;--muted:#6b7b7c;
  --radius:10px;--shadow:0 4px 24px rgba(30,61,64,.10);--shadow-lg:0 12px 40px rgba(30,61,64,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--dark);-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,textarea,select{font-family:inherit;font-size:14px}
.hidden{display:none!important}
a{color:var(--teal-mid)}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:8px;font-size:14px;font-weight:600;transition:.18s;white-space:nowrap}
.btn-primary{background:var(--teal);color:#fff}
.btn-primary:hover{background:var(--teal-dark)}
.btn-gold{background:var(--gold);color:var(--dark)}
.btn-gold:hover{background:var(--gold-dark)}
.btn-ghost{background:transparent;color:var(--teal);border:1px solid var(--grey)}
.btn-ghost:hover{border-color:var(--teal-mid);color:var(--teal-mid)}
.btn-danger{background:#fff;color:#c0392b;border:1px solid #e8b9b3}
.btn-danger:hover{background:#c0392b;color:#fff;border-color:#c0392b}
.btn-sm{padding:7px 12px;font-size:13px}
.btn:disabled{opacity:.5;cursor:not-allowed}
:focus-visible{outline:3px solid var(--gold);outline-offset:2px;border-radius:6px}

/* ── Login ── */
#loginView{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--teal-deeper),var(--teal),var(--teal-mid));padding:24px}
.login-card{background:#fff;border-radius:16px;box-shadow:var(--shadow-lg);width:100%;max-width:400px;padding:40px 36px;text-align:center}
.login-card img{height:54px;margin-bottom:8px}
.login-card .sub{color:var(--muted);font-size:13px;margin-bottom:28px}
.field{text-align:left;margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--teal-dark)}
.field input,.field textarea,.field select{width:100%;padding:11px 13px;border:1px solid var(--grey);border-radius:8px;background:#fff;color:var(--dark)}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--teal-mid);box-shadow:0 0 0 3px rgba(81,141,149,.15)}
.field .hint{font-size:12px;color:var(--muted);margin-top:5px}
.login-err{background:#fdecea;color:#c0392b;border:1px solid #f5c6c0;border-radius:8px;padding:10px;font-size:13px;margin-bottom:16px}
.login-note{font-size:11px;color:var(--muted);margin-top:18px;line-height:1.5}

/* ── App shell ── */
#appView{display:flex;min-height:100vh}
.sidebar{width:248px;background:linear-gradient(180deg,var(--teal),var(--teal-deeper));color:#fff;
  display:flex;flex-direction:column;padding:22px 16px;position:fixed;top:0;bottom:0;left:0}
.sidebar-logo{display:flex;align-items:center;justify-content:center;gap:10px;padding:10px 8px 26px}
.sidebar-logo img{width:100%;max-width:140px;height:auto}
.nav-item{display:flex;align-items:center;gap:12px;width:100%;text-align:left;color:rgba(255,255,255,.82);
  padding:12px 14px;border-radius:8px;font-size:14.5px;font-weight:500;transition:.15s;margin-bottom:4px}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-item.active{background:rgba(242,218,146,.14);color:var(--gold);font-weight:600;box-shadow:inset 3px 0 0 var(--gold)}
.nav-item .ico{width:20px;text-align:center;font-size:16px}
.sidebar-spacer{flex:1}
.sidebar-foot{border-top:1px solid rgba(255,255,255,.12);padding-top:12px}
.main{margin-left:248px;flex:1;display:flex;flex-direction:column;min-width:0}

/* ── Topbar ── */
.topbar{background:#fff;border-bottom:1px solid #e4e9e9;padding:16px 32px;display:flex;align-items:center;
  gap:16px;position:sticky;top:0;z-index:20}
.topbar h1{font-size:19px;color:var(--teal-dark)}
.topbar .topsub{font-size:12.5px;color:var(--muted);margin-top:2px}
.topbar-actions{margin-left:auto;display:flex;align-items:center;gap:10px}
.dirty-dot{display:none;align-items:center;gap:6px;font-size:12.5px;color:#b8860b;font-weight:600}
.dirty-dot.on{display:inline-flex}
.dirty-dot::before{content:'';width:8px;height:8px;border-radius:50%;background:#e6a700}
.content{padding:28px 32px;max-width:1100px;width:100%}

/* ── Cards / grid ── */
.helper{color:var(--muted);font-size:13.5px;margin-bottom:20px;line-height:1.5}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.pcard{background:#fff;border:1px solid #e4e9e9;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column}
.pcard-thumb{height:120px;background:linear-gradient(135deg,var(--teal),var(--teal-mid));background-size:cover;background-position:center;position:relative}
.pcard-tag{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.45);color:#fff;font-size:11px;font-weight:600;padding:4px 9px;border-radius:20px}
.pcard-body{padding:14px;flex:1;display:flex;flex-direction:column;gap:8px}
.pcard-title{font-size:15px;font-weight:700;color:var(--teal-dark);line-height:1.3}
.pcard-meta{font-size:12px;color:var(--muted)}
.pcard-actions{display:flex;gap:8px;margin-top:auto;padding-top:6px}

/* ── Stats (dashboard) ── */
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px}
.stat{background:#fff;border:1px solid #e4e9e9;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.stat .n{font-size:30px;font-weight:800;color:var(--teal)}
.stat .l{font-size:13px;color:var(--muted);margin-top:4px}
.panel{background:#fff;border:1px solid #e4e9e9;border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);margin-bottom:18px}
.panel h3{font-size:15px;color:var(--teal-dark);margin-bottom:6px}
.section-group{margin-bottom:26px}
.section-group>.lbl{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--teal-mid);margin-bottom:12px;display:block}

/* ── Reorder list ── */
.reorder-list{display:flex;flex-direction:column;gap:10px;max-width:680px}
.ritem{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid #e4e9e9;border-radius:9px;padding:12px 14px;box-shadow:var(--shadow);cursor:grab}
.ritem.dragging{opacity:.4}
.ritem.over{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold)}
.rhandle{color:var(--teal-mid);font-size:20px;line-height:1;cursor:grab}
.rnum{width:26px;height:26px;border-radius:50%;background:var(--teal);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rtitle{font-weight:600;color:var(--teal-dark);font-size:14px}
.rtag{font-size:11px;color:var(--muted)}

/* ── Modal / dialog ── */
.overlay{position:fixed;inset:0;background:rgba(20,40,42,.55);display:flex;align-items:flex-start;justify-content:center;
  padding:40px 16px;z-index:60;overflow:auto}
.modal-box{background:#fff;border-radius:14px;box-shadow:var(--shadow-lg);width:100%;max-width:640px;animation:pop .2s ease}
@keyframes pop{from{transform:translateY(8px) scale(.98);opacity:0}to{transform:none;opacity:1}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid #eef1f1}
.modal-head h2{font-size:17px;color:var(--teal-dark)}
.modal-x{font-size:24px;color:var(--muted);width:34px;height:34px;border-radius:8px}
.modal-x:hover{background:#f0f3f3;color:var(--dark)}
.modal-body{padding:22px;max-height:64vh;overflow:auto}
.modal-foot{padding:16px 22px;border-top:1px solid #eef1f1;display:flex;gap:10px;justify-content:flex-end}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:560px){.row2{grid-template-columns:1fr}}
textarea{resize:vertical;min-height:80px}

/* scope + images editors */
.chip-list{display:flex;flex-direction:column;gap:8px}
.chip{display:flex;gap:8px;align-items:center}
.chip input{flex:1}
.chip button{color:#c0392b;font-size:18px;width:32px;height:32px;border-radius:7px}
.chip button:hover{background:#fdecea}
.img-grid{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}
.img-thumb{position:relative;width:84px;height:64px;border-radius:8px;background-size:cover;background-position:center;border:1px solid var(--grey)}
.img-thumb button{position:absolute;top:-7px;right:-7px;background:#c0392b;color:#fff;width:22px;height:22px;border-radius:50%;font-size:13px;line-height:1;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.dropzone{border:2px dashed var(--grey);border-radius:9px;padding:18px;text-align:center;color:var(--muted);font-size:13px;cursor:pointer;transition:.15s}
.dropzone:hover,.dropzone.drag{border-color:var(--teal-mid);background:#f0f7f7;color:var(--teal-dark)}

/* tooltips */
.tip{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;
  background:var(--teal-mid);color:#fff;font-size:11px;font-weight:700;margin-left:6px;cursor:help;position:relative}
.tip::after{content:attr(data-tip);position:absolute;bottom:140%;left:50%;transform:translateX(-50%);
  background:var(--dark);color:#fff;font-size:12px;font-weight:400;padding:7px 10px;border-radius:7px;width:200px;
  opacity:0;pointer-events:none;transition:.15s;z-index:5;line-height:1.4;text-align:left}
.tip:hover::after{opacity:1}

/* toast */
#toasts{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:10px;z-index:100}
.toast{background:var(--teal-dark);color:#fff;padding:13px 18px;border-radius:9px;box-shadow:var(--shadow-lg);font-size:14px;
  display:flex;align-items:center;gap:10px;animation:slideIn .25s ease;max-width:340px}
.toast.ok{background:var(--teal)}.toast.err{background:#c0392b}
.toast::before{content:'✓';font-weight:700}.toast.err::before{content:'!'}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:none;opacity:1}}

/* tour */
#tour{position:fixed;inset:0;z-index:90;display:none}
#tour.on{display:block}
.tour-mask{position:absolute;inset:0;background:rgba(20,40,42,.6)}
.tour-spot{position:absolute;border-radius:10px;box-shadow:0 0 0 4px var(--gold),0 0 0 9999px rgba(20,40,42,.6);transition:.25s;pointer-events:none}
.tour-pop{position:absolute;background:#fff;border-radius:12px;box-shadow:var(--shadow-lg);max-width:300px;padding:18px 20px}
.tour-pop h4{color:var(--teal-dark);font-size:15px;margin-bottom:6px}
.tour-pop p{font-size:13.5px;color:var(--dark);line-height:1.55;margin-bottom:14px}
.tour-foot{display:flex;align-items:center;justify-content:space-between}
.tour-step{font-size:12px;color:var(--muted)}
.tour-btns{display:flex;gap:8px}
.empty{text-align:center;color:var(--muted);padding:50px 20px}

/* ── Section accordion ── */
.sec-group{margin-bottom:12px;border:1px solid #e4e9e9;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.sec-group-head{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:16px 20px;
  background:#fff;font-size:15px;font-weight:700;color:var(--teal-dark);cursor:pointer;transition:.15s;border:none;font-family:inherit}
.sec-group-head:hover{background:#f8fafa}
.sec-group-head .sec-arrow{margin-left:auto;font-size:11px;transition:transform .2s;color:var(--muted)}
.sec-group-head.open .sec-arrow{transform:rotate(180deg)}
.sec-group-head .sec-ico{font-size:16px;width:22px;text-align:center}
.sec-group-body{display:none;padding:0 20px 20px;background:#fff}
.sec-group-head.open+.sec-group-body{display:block}
.sec-sub{margin-top:16px;border-left:3px solid var(--gold);padding-left:16px}
.sec-sub>.lbl{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--teal-mid);margin-bottom:10px;display:block}
@media(max-width:760px){.sidebar{width:64px;padding:18px 8px}.sidebar-logo span,.nav-item span:not(.ico),.sidebar-logo img{display:none}
  .main{margin-left:64px}.content,.topbar{padding-left:16px;padding-right:16px}}
</style>
</head>
<body>

<!-- ══════════ LOGIN ══════════ -->
<div id="loginView">
  <form class="login-card" id="loginForm" autocomplete="on">
    <img src="../assets/logo-admin-login.svg" alt="IES — Integrated Engineering Systems" style="max-width:220px">
    <div class="sub">Admin Control Panel — authorised access only</div>
    <div class="login-err hidden" id="loginErr"></div>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" autocomplete="username" required>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center" id="loginBtn">Sign in</button>
    <div class="login-note">This is a private area for IES administrators. There is no public sign-up.</div>
  </form>
</div>

<!-- ══════════ APP ══════════ -->
<div id="appView" class="hidden">
  <aside class="sidebar">
    <div class="sidebar-logo"><img src="../assets/logo-new-white.svg" alt="IES — Integrated Engineering Systems"></div>
    <button class="nav-item active" data-view="dashboard"><span class="ico">▦</span><span>Dashboard</span></button>
    <button class="nav-item" data-view="projects" id="navProjects"><span class="ico">▤</span><span>Projects</span></button>
    <button class="nav-item" data-view="sections"><span class="ico">✎</span><span>Sections / Concepts</span></button>
    <button class="nav-item" data-view="reorder" id="navReorder"><span class="ico">⇅</span><span>Reorder</span></button>
    <div class="sidebar-spacer"></div>
    <div class="sidebar-foot">
      <button class="nav-item" id="helpBtn"><span class="ico">?</span><span>Help / Guide</span></button>
      <button class="nav-item" id="logoutBtn"><span class="ico">⎋</span><span>Logout</span></button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div>
        <h1 id="viewTitle">Dashboard</h1>
        <div class="topsub" id="viewSub">Overview of your portfolio content.</div>
      </div>
      <div class="topbar-actions">
        <span class="dirty-dot" id="dirtyDot">Unsaved changes</span>
        <button class="btn btn-ghost btn-sm" id="discardBtn">Discard changes</button>
        <button class="btn btn-gold" id="saveBtn" data-tour="save">Save / Publish</button>
      </div>
    </div>
    <div class="content">
      <div id="view-dashboard"></div>
      <div id="view-projects" class="hidden"></div>
      <div id="view-sections" class="hidden"></div>
      <div id="view-reorder" class="hidden"></div>
    </div>
  </div>
</div>

<!-- modal mount, dialogs, toasts, tour -->
<div id="modalMount"></div>
<div id="toasts"></div>
<div id="tour"><div class="tour-mask"></div><div class="tour-spot"></div><div class="tour-pop"></div></div>

<script>
/* ═══════════════════════════════════════════════════════════
   IES Admin Control Panel — vanilla JS, no build step.
   Talks to the /api/* serverless functions. All persistence is
   server-side; this file holds no secrets.
   ═══════════════════════════════════════════════════════════ */
(function(){
'use strict';

/* ── tiny DOM helpers ── */
var $=function(s,r){return (r||document).querySelector(s)};
var $$=function(s,r){return Array.prototype.slice.call((r||document).querySelectorAll(s))};
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]})}
function el(html){var d=document.createElement('div');d.innerHTML=html.trim();return d.firstChild}

/* ── state ── */
var state={content:null,view:'dashboard',dirty:false};
var DISCIPLINES=['Architecture','Structural','MEP','BIM'];
var STATUSES=['Completed','In Progress','On Hold','Planned'];
var SECTION_GROUPS=[
  {id:'projects',label:'Our Projects',ico:'▤',subs:[
    {grp:'Featured Projects (home)',items:[
      {k:'featTag',label:'Tag',type:'input'},{k:'featH2',label:'Heading',type:'input'},
      {k:'featSub',label:'Subtitle / description',type:'textarea'}]},
    {grp:'Projects Page',items:[
      {k:'projTag',label:'Tag',type:'input'},{k:'projH2',label:'Heading',type:'input'},
      {k:'projSub',label:'Subtitle / description',type:'textarea'}]}
  ]},
  {id:'services',label:'Services',ico:'✎',subs:[
    {grp:'Our Core Services (home)',items:[
      {k:'coreTag',label:'Tag',type:'input'},{k:'coreH2',label:'Heading',type:'input'},
      {k:'coreSub',label:'Subtitle / description',type:'textarea'}]},
    {grp:'BIM Services',items:[
      {k:'bimSvcTag',label:'Tag',type:'input'},{k:'bimSvcH2',label:'Heading',type:'input'},
      {k:'bimSvcSub',label:'Subtitle / description',type:'textarea'}]},
    {grp:'BIM & Engineering Service',items:[
      {k:'bimEngTag',label:'Tag',type:'input'},{k:'bimEngH2',label:'Heading',type:'input'},
      {k:'bimEngSub',label:'Subtitle / description',type:'textarea'}]},
    {grp:'Design & Detail Engineering',items:[
      {k:'desEngTag',label:'Tag',type:'input'},{k:'desEngH2',label:'Heading',type:'input'},
      {k:'desEngSub',label:'Subtitle / description',type:'textarea'}]}
  ]},
  {id:'about',label:'About',ico:'◈',subs:[
    {grp:'Our Story',items:[
      {k:'storyTag',label:'Tag',type:'input'},{k:'storyH2',label:'Heading',type:'input'},
      {k:'storySub',label:'Subtitle / description',type:'textarea'}]},
    {grp:'Our Team',items:[
      {k:'teamTag',label:'Tag',type:'input'},{k:'teamH2',label:'Heading',type:'input'},
      {k:'teamSub',label:'Subtitle / description',type:'textarea'}]}
  ]},
  {id:'contact',label:'Contact',ico:'✉',subs:[
    {grp:'Contact Page',items:[
      {k:'contactTag',label:'Tag',type:'input'},{k:'contactH2',label:'Heading',type:'input'},
      {k:'contactSub',label:'Subtitle / description',type:'textarea'}]},
    {grp:'Hero (home top)',items:[
      {k:'heroBadge',label:'Hero badge',type:'input'},
      {k:'heroSub',label:'Hero subtitle / description',type:'textarea'}]}
  ]}
];

/* ── toasts ── */
function toast(msg,kind){
  var t=el('<div class="toast '+(kind||'')+'">'+esc(msg)+'</div>');
  $('#toasts').appendChild(t);
  setTimeout(function(){t.style.opacity='0';t.style.transition='.3s';setTimeout(function(){t.remove()},300)},3200);
}

/* ── API ── */
var api={
  me:function(){return fetch('/api/me').then(function(r){return r.ok?r.json():Promise.reject()})},
  login:function(email,password){return fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email,password:password})})},
  logout:function(){return fetch('/api/logout',{method:'POST'})},
  getContent:function(){return fetch('/api/content',{cache:'no-store'}).then(function(r){return r.json()})},
  putContent:function(c){return fetch('/api/content',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(c)})},
  upload:function(file){return fetch('/api/upload',{method:'POST',headers:{'Content-Type':file.type,'x-filename':file.name},body:file})}
};

/* ── dirty tracking ── */
function setDirty(v){state.dirty=v;$('#dirtyDot').classList.toggle('on',v)}
window.addEventListener('beforeunload',function(e){if(state.dirty){e.preventDefault();e.returnValue=''}});

/* ═══════════ AUTH ═══════════ */
function showLogin(){$('#loginView').classList.remove('hidden');$('#appView').classList.add('hidden')}
function showApp(){$('#loginView').classList.add('hidden');$('#appView').classList.remove('hidden')}

$('#loginForm').addEventListener('submit',function(e){
  e.preventDefault();
  var btn=$('#loginBtn');btn.disabled=true;btn.textContent='Signing in…';
  $('#loginErr').classList.add('hidden');
  api.login($('#email').value,$('#password').value).then(function(r){
    return r.json().then(function(d){return{ok:r.ok,d:d}});
  }).then(function(res){
    btn.disabled=false;btn.textContent='Sign in';
    if(res.ok){$('#password').value='';boot();}
    else{var e2=$('#loginErr');e2.textContent=res.d.error||'Invalid credentials';e2.classList.remove('hidden')}
  }).catch(function(){
    btn.disabled=false;btn.textContent='Sign in';
    var e2=$('#loginErr');e2.textContent='Could not reach the server. Please try again.';e2.classList.remove('hidden');
  });
});

$('#logoutBtn').addEventListener('click',function(){
  if(state.dirty && !confirm('You have unsaved changes. Logout anyway?'))return;
  api.logout().then(function(){location.reload()});
});

/* inactivity auto-logout (30 min) */
var idleTimer;
function resetIdle(){clearTimeout(idleTimer);idleTimer=setTimeout(function(){
  api.logout().then(function(){alert('Session expired due to inactivity. Please sign in again.');location.reload()});
},30*60*1000)}
['click','keydown','mousemove','scroll'].forEach(function(ev){document.addEventListener(ev,resetIdle,{passive:true})});

/* ═══════════ NAV / VIEWS ═══════════ */
var VIEW_META={
  dashboard:{t:'Dashboard',s:'Overview of your portfolio content.'},
  projects:{t:'Projects',s:'Add, edit or delete the projects shown on your website.'},
  sections:{t:'Sections / Concepts',s:'Edit the headings, subtitles and descriptions on the public site.'},
  reorder:{t:'Reorder',s:'Drag the cards into the order you want, then Save / Publish.'}
};
function go(view){
  state.view=view;
  $$('.nav-item[data-view]').forEach(function(b){b.classList.toggle('active',b.dataset.view===view)});
  ['dashboard','projects','sections','reorder'].forEach(function(v){$('#view-'+v).classList.toggle('hidden',v!==view)});
  $('#viewTitle').textContent=VIEW_META[view].t;$('#viewSub').textContent=VIEW_META[view].s;
  if(view==='dashboard')renderDashboard();
  if(view==='projects')renderProjects();
  if(view==='sections')renderSections();
  if(view==='reorder')renderReorder();
}
$$('.nav-item[data-view]').forEach(function(b){b.addEventListener('click',function(){go(b.dataset.view)})});

/* ═══════════ DASHBOARD ═══════════ */
function renderDashboard(){
  var p=state.content.projects;
  var byDisc=DISCIPLINES.map(function(d){return{d:d,n:p.filter(function(x){return x.discipline===d}).length}});
  var html='<p class="helper">Welcome to the IES control panel. Manage everything that appears on your public website from here — no code needed.</p>';
  html+='<div class="stat-row"><div class="stat"><div class="n">'+p.length+'</div><div class="l">Total projects</div></div>';
  byDisc.forEach(function(b){html+='<div class="stat"><div class="n">'+b.n+'</div><div class="l">'+b.d+'</div></div>'});
  html+='</div>';
  html+='<div class="panel"><h3>Quick start</h3><p class="helper" style="margin:0">'+
    '1. Go to <b>Projects</b> to add or edit a project. &nbsp; 2. Use <b>Sections / Concepts</b> to change page text. &nbsp;'+
    '3. Use <b>Reorder</b> to drag projects into the order you want. &nbsp; 4. Click <b>Save / Publish</b> to make changes live.</p>'+
    '<div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap">'+
    '<button class="btn btn-primary btn-sm" id="dashAdd">+ Add Project</button>'+
    '<button class="btn btn-ghost btn-sm" id="dashTour">Replay guided tour</button>'+
    '<a class="btn btn-ghost btn-sm" href="/" target="_blank">View public site ↗</a></div></div>';
  if(state.content.updatedAt)html+='<p class="helper">Last published: '+new Date(state.content.updatedAt).toLocaleString()+'</p>';
  $('#view-dashboard').innerHTML=html;
  $('#dashAdd').onclick=function(){go('projects');openProjectEditor(null)};
  $('#dashTour').onclick=function(){startTour()};
}

/* ═══════════ PROJECTS ═══════════ */
function renderProjects(){
  var p=state.content.projects;
  var head='<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">'+
    '<button class="btn btn-primary" id="addProj" data-tour="add">+ Add Project</button>'+
    '<span class="helper" style="margin:0">Click a project to edit it, or use the buttons on each card.</span></div>';
  var grid='';
  if(!p.length){grid='<div class="empty">No projects yet. Click <b>+ Add Project</b> to create your first one.</div>';}
  else{
    grid='<div class="cards" data-tour="list">'+p.map(function(x,i){
      var bg=x.images&&x.images[0]?'style="background-image:url('+esc(x.images[0])+')"':'';
      return '<div class="pcard"><div class="pcard-thumb" '+bg+'><span class="pcard-tag">'+esc(x.badge||x.discipline)+'</span></div>'+
        '<div class="pcard-body"><div class="pcard-title">'+esc(x.title||'Untitled')+'</div>'+
        '<div class="pcard-meta">'+esc(x.location||'')+(x.area?' · '+esc(x.area):'')+'</div>'+
        '<div class="pcard-actions"><button class="btn btn-ghost btn-sm" data-edit="'+i+'">Edit</button>'+
        '<button class="btn btn-danger btn-sm" data-del="'+i+'">Delete</button></div></div></div>';
    }).join('')+'</div>';
  }
  $('#view-projects').innerHTML=head+grid;
  $('#addProj').onclick=function(){openProjectEditor(null)};
  $$('#view-projects [data-edit]').forEach(function(b){
    b.onclick=function(e){e.stopPropagation();openProjectEditor(+b.dataset.edit)};
  });
  $$('#view-projects [data-del]').forEach(function(b){
    b.onclick=function(e){e.stopPropagation();confirmDelete(+b.dataset.del)};
  });
  $$('#view-projects .pcard-title').forEach(function(t,i){t.style.cursor='pointer';t.onclick=function(){openProjectEditor(i)}});
}

function confirmDelete(i){
  var p=state.content.projects[i];
  openDialog({
    title:'Delete project?',
    body:'<p>Are you sure you want to delete <b>'+esc(p.title||'this project')+'</b>?<br>This cannot be undone once you publish.</p>',
    confirmText:'Delete',confirmClass:'btn-danger',
    onConfirm:function(){state.content.projects.splice(i,1);setDirty(true);closeDialog();renderProjects();toast('Project removed. Remember to Save / Publish.','ok')}
  });
}

/* project editor modal */
function openProjectEditor(idx){
  var isNew=idx===null;
  var p=isNew?{title:'',badge:'',discipline:'Architecture',desc:'',fullDesc:'',client:'',location:'',area:'',status:'Completed',scope:[''],images:[]}
             :JSON.parse(JSON.stringify(state.content.projects[idx]));
  if(!p.scope||!p.scope.length)p.scope=[''];
  if(!p.images)p.images=[];

  var box=el('<div class="overlay"><div class="modal-box"><div class="modal-head">'+
    '<h2>'+(isNew?'Add Project':'Edit Project')+'</h2><button class="modal-x">&times;</button></div>'+
    '<div class="modal-body"></div>'+
    '<div class="modal-foot"><button class="btn btn-ghost" data-cancel>Cancel</button>'+
    '<button class="btn btn-primary" data-save>'+(isNew?'Add project':'Save changes')+'</button></div></div></div>');
  var body=$('.modal-body',box);
  body.innerHTML=
    '<div class="field"><label>Title</label><input id="f-title" value="'+esc(p.title)+'"></div>'+
    '<div class="row2"><div class="field"><label>Discipline <span class="tip" data-tip="Controls the colour tag and the filter on the Projects page.">i</span></label>'+
      '<select id="f-discipline">'+DISCIPLINES.map(function(d){return'<option'+(d===p.discipline?' selected':'')+'>'+d+'</option>'}).join('')+'</select></div>'+
    '<div class="field"><label>Category tag / subtitle</label><input id="f-badge" placeholder="e.g. Architecture" value="'+esc(p.badge)+'"></div></div>'+
    '<div class="field"><label>Short description (card)</label><textarea id="f-desc">'+esc(p.desc)+'</textarea></div>'+
    '<div class="field"><label>Full description (Scope of Work body)</label><textarea id="f-fullDesc" style="min-height:110px">'+esc(p.fullDesc)+'</textarea></div>'+
    '<div class="row2"><div class="field"><label>Client</label><input id="f-client" value="'+esc(p.client)+'"></div>'+
      '<div class="field"><label>Location</label><input id="f-location" value="'+esc(p.location)+'"></div></div>'+
    '<div class="row2"><div class="field"><label>Scale</label><input id="f-area" placeholder="e.g. 70,414 m² BUA" value="'+esc(p.area)+'"></div>'+
      '<div class="field"><label>Status</label><select id="f-status">'+STATUSES.map(function(st){return'<option'+(st===p.status?' selected':'')+'>'+st+'</option>'}).join('')+
      (STATUSES.indexOf(p.status)<0&&p.status?'<option selected>'+esc(p.status)+'</option>':'')+'</select></div></div>'+
    '<div class="field"><label>Scope of work — bullet points</label><div class="chip-list" id="f-scope"></div>'+
      '<button class="btn btn-ghost btn-sm" id="addScope" style="margin-top:8px">+ Add bullet</button></div>'+
    '<div class="field"><label>Project photography <span class="tip" data-tip="Upload one or more images. The first image is used as the card thumbnail.">i</span></label>'+
      '<div class="img-grid" id="f-images"></div>'+
      '<div class="dropzone" id="f-drop" style="margin-top:10px">Click to upload, or drag an image here<br><small>JPG, PNG, WEBP, SVG · max 6 MB</small></div>'+
      '<input type="file" id="f-file" accept="image/*" multiple class="hidden"></div>';

  function renderScope(){
    var c=$('#f-scope',body);c.innerHTML='';
    p.scope.forEach(function(s,i){
      var r=el('<div class="chip"><input value="'+esc(s)+'"><button title="Remove">&times;</button></div>');
      $('input',r).oninput=function(){p.scope[i]=this.value};
      $('button',r).onclick=function(){p.scope.splice(i,1);if(!p.scope.length)p.scope=[''];renderScope()};
      c.appendChild(r);
    });
  }
  function renderImages(){
    var c=$('#f-images',body);c.innerHTML='';
    p.images.forEach(function(u,i){
      var t=el('<div class="img-thumb" style="background-image:url('+esc(u)+')"><button title="Remove">&times;</button></div>');
      $('button',t).onclick=function(){p.images.splice(i,1);renderImages()};
      c.appendChild(t);
    });
  }
  renderScope();renderImages();
  $('#addScope',body).onclick=function(){p.scope.push('');renderScope()};

  function doUpload(files){
    Array.prototype.forEach.call(files,function(file){
      if(!/^image\//.test(file.type)){toast('Only image files are allowed.','err');return}
      toast('Uploading '+file.name+'…');
      api.upload(file).then(function(r){return r.json().then(function(d){return{ok:r.ok,d:d}})}).then(function(res){
        if(res.ok&&res.d.url){p.images.push(res.d.url);renderImages();toast('Image added.','ok')}
        else toast(res.d.error||'Upload failed.','err');
      }).catch(function(){toast('Upload failed.','err')});
    });
  }
  var drop=$('#f-drop',body),file=$('#f-file',body);
  drop.onclick=function(){file.click()};
  file.onchange=function(){doUpload(file.files);file.value=''};
  drop.ondragover=function(e){e.preventDefault();drop.classList.add('drag')};
  drop.ondragleave=function(){drop.classList.remove('drag')};
  drop.ondrop=function(e){e.preventDefault();drop.classList.remove('drag');doUpload(e.dataTransfer.files)};

  function close(){box.remove()}
  $('.modal-x',box).onclick=close;$('[data-cancel]',box).onclick=close;
  box.addEventListener('click',function(e){if(e.target===box)close()});
  $('[data-save]',box).onclick=function(){
    p.title=$('#f-title',body).value.trim();
    if(!p.title){toast('Please enter a project title.','err');$('#f-title',body).focus();return}
    p.discipline=$('#f-discipline',body).value;
    p.badge=$('#f-badge',body).value.trim()||p.discipline;
    p.desc=$('#f-desc',body).value.trim();
    p.fullDesc=$('#f-fullDesc',body).value.trim();
    p.client=$('#f-client',body).value.trim();
    p.location=$('#f-location',body).value.trim();
    p.area=$('#f-area',body).value.trim();
    p.status=$('#f-status',body).value;
    p.scope=p.scope.map(function(s){return s.trim()}).filter(Boolean);
    if(isNew)state.content.projects.push(p);else state.content.projects[idx]=p;
    setDirty(true);close();renderProjects();
    toast(isNew?'Project added. Remember to Save / Publish.':'Project updated. Remember to Save / Publish.','ok');
  };
  $('#modalMount').appendChild(box);
  $('#f-title',body).focus();
}

/* ═══════════ SECTIONS / CONCEPTS ═══════════ */
function renderSections(){
  var s=state.content.sections||{};
  var html='<p class="helper">Edit the text shown on your public pages. Click a section to expand it. Changes go live after you click <b>Save / Publish</b>.</p>';
  SECTION_GROUPS.forEach(function(g){
    html+='<div class="sec-group">';
    html+='<button class="sec-group-head" data-toggle="sec-'+g.id+'"><span class="sec-ico">'+g.ico+'</span>'+esc(g.label)+'<span class="sec-arrow">&#9660;</span></button>';
    html+='<div class="sec-group-body" id="sec-'+g.id+'">';
    g.subs.forEach(function(sub){
      html+='<div class="sec-sub"><span class="lbl">'+esc(sub.grp)+'</span>';
      sub.items.forEach(function(it){
        var val=esc(s[it.k]||'');
        html+='<div class="field"><label>'+esc(it.label)+'</label>'+
          (it.type==='textarea'?'<textarea data-sec="'+it.k+'">'+val+'</textarea>':'<input data-sec="'+it.k+'" value="'+val+'">')+'</div>';
      });
      html+='</div>';
    });
    html+='</div></div>';
  });
  $('#view-sections').innerHTML=html;
  $$('#view-sections [data-sec]').forEach(function(f){
    f.oninput=function(){state.content.sections[f.dataset.sec]=f.value;setDirty(true)};
  });
  $$('#view-sections .sec-group-head').forEach(function(btn){
    btn.addEventListener('click',function(){
      btn.classList.toggle('open');
    });
  });
}

/* ═══════════ REORDER (drag & drop) ═══════════ */
function renderReorder(){
  var p=state.content.projects;
  var html='<p class="helper">Grab a card by the <b>⠿</b> handle and drag it up or down to change the order on your website. Then click <b>Save / Publish</b>.</p>';
  if(!p.length){$('#view-reorder').innerHTML=html+'<div class="empty">No projects to reorder yet.</div>';return}
  html+='<div class="reorder-list" id="reList" data-tour="reorder">'+p.map(function(x,i){
    return '<div class="ritem" draggable="true" data-i="'+i+'"><span class="rhandle" title="Drag to reorder">⠿</span>'+
      '<span class="rnum">'+(i+1)+'</span><div><div class="rtitle">'+esc(x.title||'Untitled')+'</div>'+
      '<div class="rtag">'+esc(x.badge||x.discipline)+' · '+esc(x.location||'')+'</div></div></div>';
  }).join('')+'</div>';
  $('#view-reorder').innerHTML=html;
  wireDrag();
}
function wireDrag(){
  var list=$('#reList'),dragEl=null;
  $$('.ritem',list).forEach(function(it){
    it.addEventListener('dragstart',function(){dragEl=it;it.classList.add('dragging')});
    it.addEventListener('dragend',function(){it.classList.remove('dragging');$$('.ritem',list).forEach(function(x){x.classList.remove('over')});commitOrder()});
    it.addEventListener('dragover',function(e){e.preventDefault();
      var after=e.clientY>it.getBoundingClientRect().top+it.offsetHeight/2;
      $$('.ritem',list).forEach(function(x){x.classList.remove('over')});it.classList.add('over');
      if(it!==dragEl){list.insertBefore(dragEl,after?it.nextSibling:it)}
    });
  });
  function commitOrder(){
    var ids=$$('.ritem',list).map(function(x){return +x.dataset.i});
    state.content.projects=ids.map(function(i){return state.content.projects[i]});
    setDirty(true);renderReorder();
  }
}

/* ═══════════ SAVE / DISCARD ═══════════ */
$('#saveBtn').addEventListener('click',function(){
  var btn=this;btn.disabled=true;var old=btn.textContent;btn.textContent='Publishing…';
  api.putContent(state.content).then(function(r){return r.json().then(function(d){return{ok:r.ok,d:d}})}).then(function(res){
    btn.disabled=false;btn.textContent=old;
    if(res.ok){state.content.updatedAt=res.d.updatedAt;setDirty(false);toast('Changes published — your site is now live.','ok');if(state.view==='dashboard')renderDashboard()}
    else toast(res.d.error||'Could not save. Please try again.','err');
  }).catch(function(){btn.disabled=false;btn.textContent=old;toast('Could not reach the server.','err')});
});
$('#discardBtn').addEventListener('click',function(){
  if(!state.dirty){toast('No changes to discard.');return}
  openDialog({title:'Discard changes?',body:'<p>This reloads the last published version and loses your unsaved edits.</p>',
    confirmText:'Discard',confirmClass:'btn-danger',onConfirm:function(){closeDialog();loadContent().then(function(){setDirty(false);go(state.view);toast('Changes discarded.','ok')})}});
});

/* ═══════════ DIALOG ═══════════ */
function openDialog(o){
  var box=el('<div class="overlay"><div class="modal-box" style="max-width:420px"><div class="modal-head"><h2>'+esc(o.title)+'</h2><button class="modal-x">&times;</button></div>'+
    '<div class="modal-body">'+o.body+'</div><div class="modal-foot"><button class="btn btn-ghost" data-cancel>Cancel</button>'+
    '<button class="btn '+(o.confirmClass||'btn-primary')+'" data-ok>'+esc(o.confirmText||'OK')+'</button></div></div></div>');
  box.id='dialog';
  $('.modal-x',box).onclick=closeDialog;$('[data-cancel]',box).onclick=closeDialog;
  box.addEventListener('click',function(e){if(e.target===box)closeDialog()});
  $('[data-ok]',box).onclick=o.onConfirm;
  $('#modalMount').appendChild(box);
}
function closeDialog(){var d=$('#dialog');if(d)d.remove()}

/* ═══════════ GUIDED TOUR ═══════════ */
var TOUR=[
  {sel:'#navProjects',title:'Your Projects',text:'This is your Projects list — add, edit, or delete the projects shown on your website here.'},
  {sel:'[data-tour="add"],#addProj,#navProjects',title:'Add a project',text:'Click + Add Project to create one. Fill in the title, subtitle, description, client, location, scale, status, and upload photos.'},
  {sel:'.nav-item[data-view="sections"]',title:'Edit page text',text:'To change section concepts, subtitles and descriptions on the site, open Sections / Concepts.'},
  {sel:'#navReorder',title:'Reorder by dragging',text:'Go to Reorder and simply drag and drop the cards into the order you want — then Save.'},
  {sel:'#saveBtn',title:'Save / Publish',text:'Always click Save / Publish to make your changes go live. Use Logout when you are done.'}
];
var tourIdx=0;
function startTour(){tourIdx=0;$('#tour').classList.add('on');showTourStep()}
function endTour(){$('#tour').classList.remove('on');try{localStorage.setItem('ies_tour_done','1')}catch(e){}}
function showTourStep(){
  var step=TOUR[tourIdx];var target=document.querySelector(step.sel.split(',')[0])||document.querySelector(step.sel.split(',').pop());
  var r=target?target.getBoundingClientRect():{top:80,left:260,width:200,height:40};
  var spot=$('.tour-spot'),pop=$('.tour-pop');
  spot.style.top=(r.top-6)+'px';spot.style.left=(r.left-6)+'px';spot.style.width=(r.width+12)+'px';spot.style.height=(r.height+12)+'px';
  pop.innerHTML='<h4>'+esc(step.title)+'</h4><p>'+esc(step.text)+'</p><div class="tour-foot"><span class="tour-step">Step '+(tourIdx+1)+' of '+TOUR.length+'</span>'+
    '<div class="tour-btns"><button class="btn btn-ghost btn-sm" data-skip>Skip tour</button><button class="btn btn-primary btn-sm" data-next>'+(tourIdx===TOUR.length-1?'Got it':'Next')+'</button></div></div>';
  var top=r.top+r.height+14;if(top+150>window.innerHeight)top=Math.max(14,r.top-160);
  var left=Math.min(Math.max(14,r.left),window.innerWidth-320);
  pop.style.top=top+'px';pop.style.left=left+'px';
  $('[data-skip]',pop).onclick=endTour;
  $('[data-next]',pop).onclick=function(){if(tourIdx<TOUR.length-1){tourIdx++;showTourStep()}else endTour()};
}
$('#helpBtn').addEventListener('click',startTour);

/* ═══════════ BOOT ═══════════ */
function loadContent(){
  return api.getContent().then(function(c){
    if(!c.projects)c.projects=[];if(!c.sections)c.sections={};
    c.projects.forEach(function(p){if(!p.images)p.images=[];if(!p.scope)p.scope=[]});
    state.content=c;
  });
}
function boot(){
  api.me().then(function(){
    showApp();resetIdle();
    loadContent().then(function(){
      go('dashboard');
      try{if(!localStorage.getItem('ies_tour_done'))setTimeout(startTour,500)}catch(e){}
    });
  }).catch(showLogin);
}
boot();
})();
</script>
