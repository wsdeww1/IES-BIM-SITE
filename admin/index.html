<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>IES Admin — Control Panel</title>
<style>
@font-face{font-family:'Noto Sans';src:url('../fonts/Noto Sans Regular.ttf') format('truetype');font-weight:400;font-display:swap}
:root{
  --teal:#3B6C70;--teal-mid:#518D95;--teal-dark:#2d5356;--teal-deeper:#1e3d40;
  --gold:#F2DA92;--gold-dark:#d4b85e;
  --grey:#CCCCCC;--bg:#f4f6f6;--white:#fff;--dark:#2A2A2A;--muted:#6b7b7c;
  --ok:#2e9e5b;--warn:#e6a700;--danger:#c0392b;
  --radius:12px;--shadow:0 4px 24px rgba(30,61,64,.08);--shadow-lg:0 12px 40px rgba(30,61,64,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--dark);-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,textarea,select{font-family:inherit;font-size:14px}
.hidden{display:none!important}
a{color:var(--teal-mid)}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:8px;font-size:14px;font-weight:600;transition:.18s;white-space:nowrap}
.btn-primary{background:var(--teal);color:#fff}
.btn-primary:hover{background:var(--teal-dark)}
.btn-gold{background:var(--gold);color:var(--dark)}
.btn-gold:hover{background:var(--gold-dark)}
.btn-ghost{background:transparent;color:var(--teal);border:1px solid var(--grey)}
.btn-ghost:hover{border-color:var(--teal-mid);color:var(--teal-mid)}
.btn-danger{background:#fff;color:var(--danger);border:1px solid #e8b9b3}
.btn-danger:hover{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn-sm{padding:7px 12px;font-size:13px}
.btn:disabled{opacity:.5;cursor:not-allowed}
:focus-visible{outline:3px solid var(--gold);outline-offset:2px;border-radius:6px}

/* ── Login ── */
#loginView{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--teal-deeper),var(--teal),var(--teal-mid));padding:24px}
.login-card{background:#fff;border-radius:16px;box-shadow:var(--shadow-lg);width:100%;max-width:400px;padding:40px 36px;text-align:center}
.login-card img{height:54px;margin-bottom:8px}
.login-card .sub{color:var(--muted);font-size:13px;margin-bottom:28px}
.field{text-align:left;margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--teal-dark)}
.field input,.field textarea,.field select{width:100%;padding:11px 13px;border:1px solid var(--grey);border-radius:8px;background:#fff;color:var(--dark)}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--teal-mid);box-shadow:0 0 0 3px rgba(81,141,149,.15)}
.field .hint{font-size:12px;color:var(--muted);margin-top:5px}
.login-err{background:#fdecea;color:var(--danger);border:1px solid #f5c6c0;border-radius:8px;padding:10px;font-size:13px;margin-bottom:16px}
.login-note{font-size:11px;color:var(--muted);margin-top:18px;line-height:1.5}

/* ── App shell ── */
#appView{display:flex;min-height:100vh}
.sidebar{width:250px;background:linear-gradient(180deg,var(--teal),var(--teal-deeper));color:#fff;
  display:flex;flex-direction:column;padding:22px 16px;position:fixed;top:0;bottom:0;left:0;z-index:30;overflow-y:auto}
.sidebar-logo{display:flex;align-items:center;justify-content:center;gap:10px;padding:6px 8px 18px}
.sidebar-logo img{width:100%;max-width:150px;height:auto}
.nav-sec{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.45);padding:14px 14px 6px}
.nav-item{display:flex;align-items:center;gap:12px;width:100%;text-align:left;color:rgba(255,255,255,.82);
  padding:11px 14px;border-radius:8px;font-size:14px;font-weight:500;transition:.15s;margin-bottom:3px}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-item.active{background:rgba(242,218,146,.14);color:var(--gold);font-weight:600;box-shadow:inset 3px 0 0 var(--gold)}
.nav-item .ico{width:20px;text-align:center;font-size:16px}
.sidebar-spacer{flex:1;min-height:10px}
.sidebar-foot{border-top:1px solid rgba(255,255,255,.12);padding-top:10px;margin-top:10px}
.main{margin-left:250px;flex:1;display:flex;flex-direction:column;min-width:0}

/* ── Topbar ── */
.topbar{background:#fff;border-bottom:1px solid #e4e9e9;padding:15px 30px;display:flex;align-items:center;
  gap:16px;position:sticky;top:0;z-index:20}
.topbar h1{font-size:19px;color:var(--teal-dark)}
.topbar .topsub{font-size:12.5px;color:var(--muted);margin-top:2px}
.topbar-actions{margin-left:auto;display:flex;align-items:center;gap:10px}
.menu-btn{display:none;font-size:22px;color:var(--teal-dark);width:38px;height:38px;border-radius:8px}
.menu-btn:hover{background:#f0f3f3}
.dirty-dot{display:none;align-items:center;gap:6px;font-size:12.5px;color:#b8860b;font-weight:600}
.dirty-dot.on{display:inline-flex}
.dirty-dot::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--warn)}
.content{padding:26px 30px;max-width:1180px;width:100%}

/* ── KPI cards ── */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:16px;margin-bottom:22px}
.kpi{background:#fff;border:1px solid #e4e9e9;border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;right:-18px;top:-18px;width:64px;height:64px;border-radius:50%;background:rgba(81,141,149,.07)}
.kpi .k-ico{font-size:18px;opacity:.7}
.kpi .k-n{font-size:30px;font-weight:800;color:var(--teal);line-height:1.1;margin-top:6px}
.kpi .k-l{font-size:12.5px;color:var(--muted);margin-top:4px}
.kpi .k-sub{font-size:11.5px;color:var(--muted);margin-top:6px}
.kpi.live .k-n{color:var(--ok)}
.live-dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--ok);margin-right:6px;box-shadow:0 0 0 0 rgba(46,158,91,.6);animation:pulse 1.8s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(46,158,91,.55)}70%{box-shadow:0 0 0 9px rgba(46,158,91,0)}100%{box-shadow:0 0 0 0 rgba(46,158,91,0)}}

/* ── Panels / grids ── */
.helper{color:var(--muted);font-size:13.5px;margin-bottom:18px;line-height:1.5}
.panel{background:#fff;border:1px solid #e4e9e9;border-radius:var(--radius);padding:20px 22px;box-shadow:var(--shadow);margin-bottom:18px}
.panel-head{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.panel-head h3{font-size:15px;color:var(--teal-dark)}
.panel-head .panel-actions{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:860px){.grid-2{grid-template-columns:1fr}}

/* ── Cards (projects) ── */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
.pcard{background:#fff;border:1px solid #e4e9e9;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column}
.pcard-thumb{height:120px;background:linear-gradient(135deg,var(--teal),var(--teal-mid));background-size:cover;background-position:center;position:relative}
.pcard-tag{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.45);color:#fff;font-size:11px;font-weight:600;padding:4px 9px;border-radius:20px}
.pcard-body{padding:14px;flex:1;display:flex;flex-direction:column;gap:8px}
.pcard-title{font-size:15px;font-weight:700;color:var(--teal-dark);line-height:1.3}
.pcard-meta{font-size:12px;color:var(--muted)}
.pcard-actions{display:flex;gap:8px;margin-top:auto;padding-top:6px}

/* ── Charts ── */
.chart-wrap{width:100%;overflow:hidden}
.chart svg{width:100%;height:auto;display:block}
.legend{display:flex;gap:18px;flex-wrap:wrap;margin-top:10px;font-size:12.5px;color:var(--muted)}
.legend i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:6px;vertical-align:-1px}
.barlist{display:flex;flex-direction:column;gap:10px}
.barrow{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;font-size:13px}
.barrow .bl{color:var(--dark);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.barrow .bv{color:var(--muted);font-weight:600;font-size:12.5px}
.bartrack{grid-column:1/3;height:8px;background:#eef3f3;border-radius:6px;overflow:hidden}
.bartrack i{display:block;height:100%;background:linear-gradient(90deg,var(--teal-mid),var(--teal));border-radius:6px}
.range-tabs{display:inline-flex;border:1px solid var(--grey);border-radius:8px;overflow:hidden}
.range-tabs button{padding:7px 13px;font-size:13px;font-weight:600;color:var(--muted);background:#fff}
.range-tabs button.on{background:var(--teal);color:#fff}

/* ── Reorder ── */
.reorder-list{display:flex;flex-direction:column;gap:10px;max-width:720px}
.ritem{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid #e4e9e9;border-radius:9px;padding:12px 14px;box-shadow:var(--shadow);cursor:grab}
.ritem.dragging{opacity:.4}.ritem.over{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold)}
.rhandle{color:var(--teal-mid);font-size:20px;line-height:1;cursor:grab}
.rnum{width:26px;height:26px;border-radius:50%;background:var(--teal);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rtitle{font-weight:600;color:var(--teal-dark);font-size:14px}.rtag{font-size:11px;color:var(--muted)}

/* ── Modal ── */
.overlay{position:fixed;inset:0;background:rgba(20,40,42,.55);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:60;overflow:auto}
.modal-box{background:#fff;border-radius:14px;box-shadow:var(--shadow-lg);width:100%;max-width:640px;animation:pop .2s ease}
@keyframes pop{from{transform:translateY(8px) scale(.98);opacity:0}to{transform:none;opacity:1}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid #eef1f1}
.modal-head h2{font-size:17px;color:var(--teal-dark)}
.modal-x{font-size:24px;color:var(--muted);width:34px;height:34px;border-radius:8px}
.modal-x:hover{background:#f0f3f3;color:var(--dark)}
.modal-body{padding:22px;max-height:64vh;overflow:auto}
.modal-foot{padding:16px 22px;border-top:1px solid #eef1f1;display:flex;gap:10px;justify-content:flex-end}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:560px){.row2{grid-template-columns:1fr}}
textarea{resize:vertical;min-height:80px}

.chip-list{display:flex;flex-direction:column;gap:8px}
.chip{display:flex;gap:8px;align-items:center}.chip input{flex:1}
.chip button{color:var(--danger);font-size:18px;width:32px;height:32px;border-radius:7px}.chip button:hover{background:#fdecea}
.img-grid{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}
.img-thumb{position:relative;width:84px;height:64px;border-radius:8px;background-size:cover;background-position:center;border:1px solid var(--grey)}
.img-thumb button{position:absolute;top:-7px;right:-7px;background:var(--danger);color:#fff;width:22px;height:22px;border-radius:50%;font-size:13px;line-height:1}
.dropzone{border:2px dashed var(--grey);border-radius:9px;padding:18px;text-align:center;color:var(--muted);font-size:13px;cursor:pointer;transition:.15s}
.dropzone:hover,.dropzone.drag{border-color:var(--teal-mid);background:#f0f7f7;color:var(--teal-dark)}

.tip{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:var(--teal-mid);color:#fff;font-size:11px;font-weight:700;margin-left:6px;cursor:help;position:relative}
.tip::after{content:attr(data-tip);position:absolute;bottom:140%;left:50%;transform:translateX(-50%);background:var(--dark);color:#fff;font-size:12px;font-weight:400;padding:7px 10px;border-radius:7px;width:210px;opacity:0;pointer-events:none;transition:.15s;z-index:5;line-height:1.4;text-align:left}
.tip:hover::after{opacity:1}

#toasts{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:10px;z-index:100}
.toast{background:var(--teal-dark);color:#fff;padding:13px 18px;border-radius:9px;box-shadow:var(--shadow-lg);font-size:14px;display:flex;align-items:center;gap:10px;animation:slideIn .25s ease;max-width:340px}
.toast.ok{background:var(--teal)}.toast.err{background:var(--danger)}
.toast::before{content:'✓';font-weight:700}.toast.err::before{content:'!'}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:none;opacity:1}}
.empty{text-align:center;color:var(--muted);padding:50px 20px}

/* ── Section accordion ── */
.sec-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.sec-search{position:relative;flex:1;min-width:200px}
.sec-search input{width:100%;padding:11px 13px 11px 38px;border:1px solid var(--grey);border-radius:8px;background:#fff;color:var(--dark)}
.sec-search input:focus{outline:none;border-color:var(--teal-mid);box-shadow:0 0 0 3px rgba(81,141,149,.15)}
.sec-search::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;opacity:.6}
.sec-hint{font-size:12px;color:var(--muted);margin:2px 0 10px}
.sec-noresult{text-align:center;color:var(--muted);padding:30px 20px}
.field-check{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.field-check input[type=checkbox]{width:18px;height:18px;accent-color:var(--teal);cursor:pointer;flex-shrink:0}
.field-check label{font-size:13.5px;color:var(--dark);cursor:pointer;margin:0}
.sec-group{margin-bottom:12px;border:1px solid #e4e9e9;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);background:#fff}
.sec-group-head{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:16px 20px;background:#fff;font-size:15px;font-weight:700;color:var(--teal-dark);cursor:pointer;transition:.15s;font-family:inherit}
.sec-group-head:hover{background:#f8fafa}.sec-group-head.open{background:#f4f8f8}
.sec-group-head .sec-ico{font-size:16px;width:22px;text-align:center}
.sec-acc{display:grid;grid-template-rows:0fr;transition:grid-template-rows .28s ease}
.sec-acc.open{grid-template-rows:1fr}
.sec-acc-inner{overflow:hidden;min-height:0}
.sec-arrow{margin-left:auto;font-size:10px;transition:transform .25s;color:var(--muted)}
.sec-group-head.open .sec-arrow,.sec-sub-head.open .sec-arrow{transform:rotate(180deg)}
.sec-group>.sec-acc>.sec-acc-inner{padding:6px 18px 16px}
.sec-sub{margin-top:12px;border:1px solid #eef1f1;border-left:3px solid var(--gold);border-radius:8px;background:#fbfcfc;overflow:hidden}
.sec-sub:first-child{margin-top:8px}
.sec-sub-head{display:flex;align-items:center;gap:10px;width:100%;text-align:left;border:none;background:none;font-family:inherit;cursor:pointer;padding:13px 16px;font-size:12.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--teal-mid);transition:.15s}
.sec-sub-head:hover{background:#f1f6f6}.sec-sub-head.open{background:#eef5f5}
.sec-sub>.sec-acc>.sec-acc-inner{padding:6px 16px 4px}
.sec-sub .field{margin-bottom:14px}

/* ── Mobile ── */
.scrim{display:none;position:fixed;inset:0;background:rgba(20,40,42,.45);z-index:25}
@media(max-width:860px){
  .sidebar{transform:translateX(-100%);transition:transform .25s;box-shadow:var(--shadow-lg)}
  .sidebar.open{transform:none}
  .main{margin-left:0}
  .menu-btn{display:inline-flex;align-items:center;justify-content:center}
  .scrim.on{display:block}
  .content,.topbar{padding-left:16px;padding-right:16px}
  .topbar-actions .lbl{display:none}
}
</style>
</head>
<body>

<!-- ══════════ LOGIN ══════════ -->
<div id="loginView">
  <form class="login-card" id="loginForm" autocomplete="on">
    <img src="../assets/logo-admin-login.svg" alt="IES — Integrated Engineering Systems" style="max-width:220px">
    <div class="sub">Admin Control Panel — authorised access only</div>
    <div class="login-err hidden" id="loginErr"></div>
    <div class="field"><label for="email">Email</label>
      <input type="email" id="email" autocomplete="username" required></div>
    <div class="field"><label for="password">Password</label>
      <input type="password" id="password" autocomplete="current-password" required></div>
    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center" id="loginBtn">Sign in</button>
    <div class="login-note">This is a private area for IES administrators. There is no public sign-up.</div>
  </form>
</div>

<!-- ══════════ APP ══════════ -->
<div id="appView" class="hidden">
  <div class="scrim" id="scrim"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><img src="../assets/logo-new-white.svg" alt="IES"></div>

    <div class="nav-sec">Overview</div>
    <button class="nav-item active" data-view="dashboard"><span class="ico">▦</span><span>Dashboard</span></button>
    <button class="nav-item" data-view="analytics"><span class="ico">📈</span><span>Analytics</span></button>

    <div class="nav-sec">Edit the website</div>
    <button class="nav-item" data-view="projects"><span class="ico">▤</span><span>Project Cards</span></button>
    <button class="nav-item" data-view="cards"><span class="ico">⬡</span><span>Cards</span></button>
    <button class="nav-item" data-view="text"><span class="ico">✎</span><span>Titles &amp; Texts</span></button>
    <button class="nav-item" data-view="contact"><span class="ico">✉</span><span>Contact &amp; Team</span></button>
    <button class="nav-item" data-view="seo"><span class="ico">🔍</span><span>SEO &amp; Visibility</span></button>
    <button class="nav-item" data-view="reorder"><span class="ico">⇅</span><span>Reorder Projects</span></button>

    <div class="sidebar-spacer"></div>
    <div class="sidebar-foot">
      <a class="nav-item" href="/" target="_blank"><span class="ico">↗</span><span>View public site</span></a>
      <button class="nav-item" id="helpBtn"><span class="ico">?</span><span>Help / Guide</span></button>
      <button class="nav-item" id="logoutBtn"><span class="ico">⎋</span><span>Logout</span></button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="menu-btn" id="menuBtn">☰</button>
      <div>
        <h1 id="viewTitle">Dashboard</h1>
        <div class="topsub" id="viewSub">Your website at a glance.</div>
      </div>
      <div class="topbar-actions">
        <span class="dirty-dot" id="dirtyDot"><span class="lbl">Unsaved changes</span></span>
        <button class="btn btn-ghost btn-sm" id="discardBtn">Discard</button>
        <button class="btn btn-gold" id="saveBtn">Save / Publish</button>
      </div>
    </div>
    <div class="content">
      <div id="view-dashboard"></div>
      <div id="view-analytics" class="hidden"></div>
      <div id="view-projects" class="hidden"></div>
      <div id="view-cards" class="hidden"></div>
      <div id="view-text" class="hidden"></div>
      <div id="view-contact" class="hidden"></div>
      <div id="view-seo" class="hidden"></div>
      <div id="view-reorder" class="hidden"></div>
    </div>
  </div>
</div>

<div id="modalMount"></div>
<div id="toasts"></div>

<script>
/* ═══════════════════════════════════════════════════════════
   IES Admin Control Panel — vanilla JS, no build step.
   Screens: Dashboard, Analytics, Project Cards, Titles & Texts,
   Contact & Team, SEO & Visibility, Reorder.
   Talks to /api/* serverless functions; holds no secrets.
   ═══════════════════════════════════════════════════════════ */
(function(){
'use strict';
var $=function(s,r){return (r||document).querySelector(s)};
var $$=function(s,r){return Array.prototype.slice.call((r||document).querySelectorAll(s))};
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]})}
function el(html){var d=document.createElement('div');d.innerHTML=html.trim();return d.firstChild}
function nf(n){return (Number(n)||0).toLocaleString()}

var state={content:null,view:'dashboard',dirty:false,stats:null,range:14};
var DISCIPLINES=['Architecture','Structural','MEP','BIM'];
var STATUSES=['Completed','In Progress','On Hold','Planned'];

/* ── Section field definitions, grouped by SCREEN ──
   screen: 'text'    → Titles & Texts (headings, intros, paragraphs, labels)
           'cards'   → Cards (every card across the site)
           'contact' → Contact & Team (team numbers, footer)
           'seo'     → SEO & Visibility                                  */
var SECTION_GROUPS=[
  /* ===== TITLES & TEXTS ===== */
  {screen:'text',id:'projectsText',label:'Portfolio — Projects',ico:'▤',subs:[

/* ── toasts ── */
function toast(msg,kind){
  var t=el('<div class="toast '+(kind||'')+'">'+esc(msg)+'</div>');
  $('#toasts').appendChild(t);
  setTimeout(function(){t.style.opacity='0';t.style.transition='.3s';setTimeout(function(){t.remove()},300)},3200);
}

var api={
  me:function(){return fetch('/api/me').then(function(r){return r.ok?r.json():Promise.reject()})},
  login:function(email,password){return fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email,password:password})})},
  logout:function(){return fetch('/api/logout',{method:'POST'})},
  getContent:function(){return fetch('/api/content',{cache:'no-store'}).then(function(r){return r.json()})},
  putContent:function(c){return fetch('/api/content',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(c)})},

};

/* ── dirty tracking ── */
function setDirty(v){state.dirty=v;$('#dirtyDot').classList.toggle('on',v)}

/* ═══════════ AUTH ═══════════ */
function showLogin(){$('#loginView').classList.remove('hidden');$('#appView').classList.add('hidden')}
function showApp(){$('#loginView').classList.add('hidden');$('#appView').classList.remove('hidden')}
$('#loginForm').addEventListener('submit',function(e){
  e.preventDefault();
  var btn=$('#loginBtn');btn.disabled=true;btn.textContent='Signing in…';$('#loginErr').classList.add('hidden');
  api.login($('#email').value,$('#password').value).then(function(r){return r.json().then(function(d){return{ok:r.ok,d:d}})}).then(function(res){
    btn.disabled=false;btn.textContent='Sign in';
    if(res.ok){$('#password').value='';boot();}
    else{var e2=$('#loginErr');e2.textContent=res.d.error||'Invalid credentials';e2.classList.remove('hidden')}
  }).catch(function(){btn.disabled=false;btn.textContent='Sign in';var e2=$('#loginErr');e2.textContent='Could not reach the server. Please try again.';e2.classList.remove('hidden')});
});
$('#logoutBtn').addEventListener('click',function(){
  if(state.dirty && !confirm('You have unsaved changes. Logout anyway?'))return;
  api.logout().then(function(){location.reload()});
});
var idleTimer;
function resetIdle(){clearTimeout(idleTimer);idleTimer=setTimeout(function(){
  api.logout().then(function(){alert('Session expired due to inactivity. Please sign in again.');location.reload()});
},30*60*1000)}
['click','keydown','mousemove','scroll'].forEach(function(ev){document.addEventListener(ev,resetIdle,{passive:true})});

function kpiSkeleton(n){var o='';for(var i=0;i<n;i++)o+='<div class="kpi"><div class="k-n">—</div><div class="k-l">Loading…</div></div>';return o}
function kpi(cls,ico,label,n,sub,live){

    '<div class="k-ico">'+(live?'<span class="live-dot"></span>':esc(ico))+'</div>'+
    '<div class="k-n">'+nf(n)+'</div><div class="k-l">'+esc(label)+'</div>'+
    (sub?'<div class="k-sub">'+esc(sub)+'</div>':'')+'</div>';
}

function add(a,b){return a+(Number(b)||0)}
function objToRows(o){return Object.keys(o||{}).map(function(k){return{label:cap(k),value:o[k]}}).sort(function(a,b){return b.value-a.value})}
function cap(s){s=String(s||'');return s.charAt(0).toUpperCase()+s.slice(1)}
function friendlyPage(p){var m={Home:'Home',Projects:'Projects',BIMServices:'BIM Services',DesignEngineering:'BIM & Engineering',DesignEngineering1:'Design & Detail',AboutStory:'About — Story',AboutTeam:'About — Team',Contact:'Contact'};return m[p]||p}
/* ═══════════ WEEKLY ANALYTICS (resets every Monday, UTC) ═══════════ */
function ymd(d){return d.toISOString().slice(0,10)}
function mondayOf(d){var x=new Date(Date.UTC(d.getUTCFullYear(),d.getUTCMonth(),d.getUTCDate()));x.setUTCDate(x.getUTCDate()-((x.getUTCDay()+6)%7));return x}
function thisWeekRange(){var s=mondayOf(new Date()),e=new Date(s);e.setUTCDate(e.getUTCDate()+6);return{start:ymd(s),end:ymd(e)}}
function lastWeekRange(){var s=mondayOf(new Date());s.setUTCDate(s.getUTCDate()-7);var e=new Date(s);e.setUTCDate(e.getUTCDate()+6);return{start:ymd(s),end:ymd(e)}}
/* True only during the 24h right after a week ends (i.e. all of Monday, UTC). */
function lastWeekWindowOpen(){var diff=Date.now()-mondayOf(new Date()).getTime();return diff>=0&&diff<86400000}
function sliceSeries(s,startKey,endKey){var out=[];for(var i=0;i<s.series.length;i++){var d=s.series[i];if(d>=startKey&&d<=endKey)out.push({date:d,pv:s.pvSeries[i]||0,uv:s.uvSeries[i]||0,ed:s.editSeries[i]||0})}return out}

/* Renders the time-limited "Download last week" button into a slot, if open. */
function renderLastWeekSlot(sel){
  var slot=$(sel);if(!slot)return;
  if(!lastWeekWindowOpen()){slot.innerHTML='';return}
  if(!slot.firstChild){
    slot.innerHTML='<button class="btn btn-primary btn-sm" title="Available for 24h after the week ends">⬇ Last week’s report</button>';
    slot.firstChild.onclick=exportLastWeek;
  }
}

}

/* ── build the report sheets for a date range ── */
function reportSheets(s,startKey,endKey,title){
  var rows=sliceSeries(s,startKey,endKey),totPv=0,totUv=0,totEd=0,busy={d:'',v:-1};
  rows.forEach(function(r){totPv+=r.pv;totUv+=r.uv;totEd+=r.ed;if(r.pv>busy.v)busy={d:r.date,v:r.pv}});
  var summary=[[title],['Period',startKey+'  to  '+endKey],['Generated',new Date().toLocaleString()],[],
    ['Page views (total)',totPv],['Unique visitors (daily sum)',totUv],['Edits published',totEd],
    ['Busiest day',busy.d?busy.d+' ('+busy.v+' views)':'—'],['Active days',rows.filter(function(r){return r.pv>0}).length]];
  var daily=[['Date','Page views','Unique visitors','Edits published']];
  rows.forEach(function(r){daily.push([r.date,r.pv,r.uv,r.ed])});
  daily.push(['Total',totPv,totUv,totEd]);
  return [{name:'Summary',rows:summary},{name:'Daily',rows:daily}];
}
function exportExcelRange(){
  var s=state.stats;if(!s||!s.series.length){toast('Nothing to export yet.');return}
  var start=s.series[0],end=s.series[s.series.length-1];
  downloadXlsx('ies-analytics-'+end+'.xlsx',reportSheets(s,start,end,'IES Analytics — last '+s.series.length+' days'));
  toast('Excel file downloaded.','ok');
}
function exportLastWeek(){
  var w=lastWeekRange();
  api.stats(21).then(function(s){
    state.stats=s;
    downloadXlsx('ies-weekly-report-'+w.start+'_to_'+w.end+'.xlsx',reportSheets(s,w.start,w.end,'IES Weekly Report — '+w.start+' to '+w.end));
    toast('Last week’s report downloaded.','ok');
  }).catch(function(){toast('Could not load last week’s data.')});
}

/* ═══════════ MINIMAL .XLSX WRITER (no dependencies) ═══════════
   Builds a real OpenXML workbook (zip + XML) so it opens cleanly in Excel,
   Google Sheets and Numbers — no "format mismatch" warning. */
function _xlCol(n){var s='';n++;while(n>0){var m=(n-1)%26;s=String.fromCharCode(65+m)+s;n=(n-m-1)/26}return s}
function _xlEsc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function _sheetXml(rows){
  var x='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetData>';
  rows.forEach(function(row,ri){
    x+='<row r="'+(ri+1)+'">';
    (row||[]).forEach(function(cell,ci){
      var ref=_xlCol(ci)+(ri+1);
      if(typeof cell==='number'&&isFinite(cell))x+='<c r="'+ref+'"><v>'+cell+'</v></c>';
      else x+='<c r="'+ref+'" t="inlineStr"><is><t xml:space="preserve">'+_xlEsc(cell==null?'':cell)+'</t></is></c>';
    });
    x+='</row>';
  });
  return x+'</sheetData></worksheet>';
}
function _u8(s){return new TextEncoder().encode(s)}
function _concat(arrs){var n=0;arrs.forEach(function(a){n+=a.length});var o=new Uint8Array(n),p=0;arrs.forEach(function(a){o.set(a,p);p+=a.length});return o}
function _crc32(buf){var t=_crc32.t;if(!t){t=[];for(var n=0;n<256;n++){var c=n;for(var k=0;k<8;k++)c=c&1?(0xEDB88320^(c>>>1)):(c>>>1);t[n]=c>>>0}_crc32.t=t}var crc=-1;for(var i=0;i<buf.length;i++)crc=(crc>>>8)^t[(crc^buf[i])&255];return (crc^-1)>>>0}
function _zip(files){
  function u16(n){return new Uint8Array([n&255,(n>>>8)&255])}
  function u32(n){return new Uint8Array([n&255,(n>>>8)&255,(n>>>16)&255,(n>>>24)&255])}
  var chunks=[],central=[],offset=0;
  files.forEach(function(f){
    var name=_u8(f.name),data=f.data,crc=_crc32(data);
    chunks.push(_concat([u32(0x04034b50),u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(data.length),u32(data.length),u16(name.length),u16(0)]),name,data);
    central.push(_concat([u32(0x02014b50),u16(20),u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(data.length),u32(data.length),u16(name.length),u16(0),u16(0),u16(0),u16(0),u32(0),u32(offset)]),name);
    offset+=30+name.length+data.length;
  });
  var cb=_concat(central),end=_concat([u32(0x06054b50),u16(0),u16(0),u16(files.length),u16(files.length),u32(cb.length),u32(offset),u16(0)]);
  return _concat(chunks.concat([cb,end]));
}
function downloadXlsx(filename,sheets){
  var names=sheets.map(function(s){return s.name});
  var ct='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>';
  names.forEach(function(_,i){ct+='<Override PartName="/xl/worksheets/sheet'+(i+1)+'.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>'});
  ct+='</Types>';
  var wb='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets>';
  names.forEach(function(n,i){wb+='<sheet name="'+_xlEsc(n)+'" sheetId="'+(i+1)+'" r:id="rId'+(i+1)+'"/>'});
  wb+='</sheets></workbook>';
  var wbr='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">';
  names.forEach(function(_,i){wbr+='<Relationship Id="rId'+(i+1)+'" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet'+(i+1)+'.xml"/>'});
  wbr+='</Relationships>';
  var rels='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>';
  var files=[{name:'[Content_Types].xml',data:_u8(ct)},{name:'_rels/.rels',data:_u8(rels)},{name:'xl/workbook.xml',data:_u8(wb)},{name:'xl/_rels/workbook.xml.rels',data:_u8(wbr)}];
  sheets.forEach(function(s,i){files.push({name:'xl/worksheets/sheet'+(i+1)+'.xml',data:_u8(_sheetXml(s.rows))})});
  var blob=new Blob([_zip(files)],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();
  setTimeout(function(){URL.revokeObjectURL(a.href)},2000);
}

/* ── lightweight SVG charts (no dependencies) ── */
function lineChart(labels,datasets){
  var W=620,H=210,pad=30,bottom=24;
  var max=1;datasets.forEach(function(d){d.values.forEach(function(v){if(v>max)max=v})});
  var n=labels.length;
  function x(i){return pad+(W-pad*2)*(n<=1?0.5:i/(n-1))}
  function y(v){return pad+(H-pad-bottom)*(1-v/max)}
  var svg='<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" role="img">';
  // gridlines
  for(var g=0;g<=4;g++){var gy=pad+(H-pad-bottom)*g/4;svg+='<line x1="'+pad+'" y1="'+gy+'" x2="'+(W-pad)+'" y2="'+gy+'" stroke="#eef3f3" stroke-width="1"/>';
    svg+='<text x="'+(pad-6)+'" y="'+(gy+3)+'" font-size="9" fill="#9bb0b1" text-anchor="end">'+Math.round(max*(1-g/4))+'</text>';}
  datasets.forEach(function(d){
    var pts=d.values.map(function(v,i){return x(i)+','+y(v)});
    // area
    svg+='<polyline points="'+x(0)+','+y(0)+' '+pts.join(' ')+' '+x(n-1)+','+y(0)+'" fill="'+d.color+'" opacity="0.08"/>';
    svg+='<polyline points="'+pts.join(' ')+'" fill="none" stroke="'+d.color+'" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
    d.values.forEach(function(v,i){svg+='<circle cx="'+x(i)+'" cy="'+y(v)+'" r="2.6" fill="'+d.color+'"><title>'+labels[i]+': '+v+'</title></circle>'});
  });
  // x labels (first, mid, last)
  [0,Math.floor((n-1)/2),n-1].forEach(function(i){if(i>=0&&labels[i])svg+='<text x="'+x(i)+'" y="'+(H-6)+'" font-size="9" fill="#9bb0b1" text-anchor="middle">'+labels[i].slice(5)+'</text>'});
  svg+='</svg>';
  return svg;
}
function legend(items){return '<div class="legend">'+items.map(function(it){return '<span><i style="background:'+it.color+'"></i>'+esc(it.label)+'</span>'}).join('')+'</div>'}
function barList(rows){
  if(!rows||!rows.length)return '<p class="helper" style="margin:0">No data yet today.</p>';
  var total=rows.reduce(function(a,r){return a+(Number(r.value)||0)},0)||1;
  return '<div class="barlist">'+rows.slice(0,10).map(function(r){
    var pct=Math.round((Number(r.value)||0)/total*100);
    return '<div class="barrow"><span class="bl">'+esc(r.label)+'</span><span class="bv">'+nf(r.value)+' · '+pct+'%</span>'+
      '<span class="bartrack"><i style="width:'+pct+'%"></i></span></div>';
  }).join('')+'</div>';
}

function renderProjects(){

    '<button class="btn btn-primary" id="addProj">+ Add Project</button>'+
    '<button class="btn btn-ghost btn-sm" data-go="reorder">⇅ Reorder</button>'+
    '<span class="helper" style="margin:0">Click a card to edit it.</span></div>';
  var grid='';
  if(!p.length){grid='<div class="empty">No projects yet. Click <b>+ Add Project</b> to create your first one.</div>';}
  else{
    grid='<div class="cards">'+p.map(function(x,i){
      var bg=x.images&&x.images[0]?'style="background-image:url('+esc(x.images[0])+')"':'';
      return '<div class="pcard"><div class="pcard-thumb" '+bg+'><span class="pcard-tag">'+esc(x.badge||x.discipline)+'</span></div>'+
        '<div class="pcard-body"><div class="pcard-title">'+esc(x.title||'Untitled')+'</div>'+
        '<div class="pcard-meta">'+esc(x.location||'')+(x.area?' · '+esc(x.area):'')+'</div>'+

        '<button class="btn btn-danger btn-sm" data-del="'+i+'">Delete</button></div></div></div>';
    }).join('')+'</div>';
  }
  $('#view-projects').innerHTML=head+grid;
  $('#addProj').onclick=function(){openProjectEditor(null)};

  $$('#view-projects [data-del]').forEach(function(b){b.onclick=function(e){e.stopPropagation();confirmDelete(+b.dataset.del)}});

function confirmDelete(i){

  openDialog({title:'Delete project?',body:'<p>Are you sure you want to delete <b>'+esc(p.title||'this project')+'</b>?<br>This cannot be undone once you publish.</p>',
    confirmText:'Delete',confirmClass:'btn-danger',
    onConfirm:function(){state.content.projects.splice(i,1);setDirty(true);closeDialog();renderProjects();toast('Project removed. Remember to Save / Publish.','ok')}});
}
function openProjectEditor(idx){
  var isNew=idx===null;
  var p=isNew?{title:'',badge:'',discipline:'Architecture',desc:'',fullDesc:'',client:'',location:'',area:'',status:'Completed',scope:[''],images:[]}
             :JSON.parse(JSON.stringify(state.content.projects[idx]));
  if(!p.scope||!p.scope.length)p.scope=[''];if(!p.images)p.images=[];
  var box=el('<div class="overlay"><div class="modal-box"><div class="modal-head">'+

function renderSectionScreen(screen,containerId,noIntro){
  var s=state.content.sections||{};
  var groups=SECTION_GROUPS.filter(function(g){return g.screen===screen});
  var html=noIntro?'':'<p class="helper">Edit and click <b>Save / Publish</b> to make changes live. Use the search box to jump to any field.</p>';
  html+='<div class="sec-toolbar">'+
    '<div class="sec-search"><input class="secSearch" type="search" placeholder="Search fields…" autocomplete="off"></div>'+
    '<button class="btn btn-ghost btn-sm secExpand">Expand all</button>'+
    '<button class="btn btn-ghost btn-sm secCollapse">Collapse all</button></div>';
  groups.forEach(function(g){
    html+='<div class="sec-group" data-search="'+esc(g.label.toLowerCase())+'">';
    html+='<button class="sec-group-head"><span class="sec-ico">'+g.ico+'</span>'+esc(g.label)+'<span class="sec-arrow">&#9660;</span></button>';
    html+='<div class="sec-acc"><div class="sec-acc-inner">';
    g.subs.forEach(function(sub){
      html+='<div class="sec-sub" data-search="'+esc((sub.grp+' '+g.label).toLowerCase())+'">';
      html+='<button class="sec-sub-head">'+esc(sub.grp)+'<span class="sec-arrow">&#9660;</span></button>';
      html+='<div class="sec-acc"><div class="sec-acc-inner">';
      if(sub.hint)html+='<p class="sec-hint">'+esc(sub.hint)+'</p>';
      sub.items.forEach(function(it){
        var st=(it.k in s)?s[it.k]:'';
        var searchTxt=esc((it.label+' '+it.k).toLowerCase());
        if(it.type==='checkbox'){
          var on=st==='1'||st===true||st==='true';
          html+='<div class="field-check" data-search="'+searchTxt+'"><input type="checkbox" id="chk-'+it.k+'" data-sec="'+it.k+'" data-type="checkbox"'+(on?' checked':'')+'>'+
            '<label for="chk-'+it.k+'">'+esc(it.label)+'</label></div>';
        }else{
          var raw=(st!=null&&st!=='')?st:(SECTION_DEFAULTS[it.k]||'');
          var val=esc(raw);
          html+='<div class="field" data-search="'+searchTxt+'"><label>'+esc(it.label)+'</label>'+
            (it.type==='textarea'?'<textarea data-sec="'+it.k+'">'+val+'</textarea>':'<input data-sec="'+it.k+'" value="'+val+'">')+'</div>';
        }
      });
      html+='</div></div></div>';
    });
    html+='</div></div></div>';
  });
  html+='<div class="sec-noresult hidden">No fields match your search.</div>';
  var C=$(containerId);C.innerHTML=html;
  $$('[data-sec]:not([data-type="checkbox"])',C).forEach(function(f){f.oninput=function(){state.content.sections[f.dataset.sec]=f.value;setDirty(true)}});
  $$('[data-type="checkbox"]',C).forEach(function(f){f.onchange=function(){state.content.sections[f.dataset.sec]=f.checked?'1':'';setDirty(true)}});
  $$('.sec-group-head, .sec-sub-head',C).forEach(function(btn){btn.addEventListener('click',function(){
    btn.classList.toggle('open');var acc=btn.nextElementSibling;if(acc&&acc.classList.contains('sec-acc'))acc.classList.toggle('open');})});
  function setOpen(open){$$('.sec-group-head, .sec-sub-head',C).forEach(function(b){b.classList.toggle('open',open)});$$('.sec-acc',C).forEach(function(a){a.classList.toggle('open',open)})}
  $('.secExpand',C).onclick=function(){setOpen(true)};
  $('.secCollapse',C).onclick=function(){setOpen(false)};
  $('.secSearch',C).oninput=function(){
    var q=this.value.trim().toLowerCase(),anyVisible=false;
    $$('.sec-group',C).forEach(function(grp){
      var grpHit=false;
      $$('.sec-sub',grp).forEach(function(sub){
        var subHit=false;
        $$('[data-search]',sub).forEach(function(f){
          if(!f.classList.contains('field')&&!f.classList.contains('field-check'))return;
          var match=!q||f.getAttribute('data-search').indexOf(q)>-1;f.classList.toggle('hidden',!match);if(match)subHit=true;});
        if(q&&sub.getAttribute('data-search').indexOf(q)>-1)subHit=true;
        sub.classList.toggle('hidden',!subHit);
        var sh=$('.sec-sub-head',sub),sa=sh&&sh.nextElementSibling;
        if(q){sh.classList.toggle('open',subHit);if(sa)sa.classList.toggle('open',subHit)}else{sh.classList.remove('open');if(sa)sa.classList.remove('open')}
        if(subHit)grpHit=true;});
      grp.classList.toggle('hidden',!grpHit);
      var gh=$('.sec-group-head',grp),ga=gh&&gh.nextElementSibling;
      if(q){gh.classList.toggle('open',grpHit);if(ga)ga.classList.toggle('open',grpHit)}else{gh.classList.remove('open');if(ga)ga.classList.remove('open')}
      if(grpHit)anyVisible=true;});
    $('.sec-noresult',C).classList.toggle('hidden',anyVisible);
  };
}

function renderReorder(){

      '<span class="rnum">'+(i+1)+'</span><div><div class="rtitle">'+esc(x.title||'Untitled')+'</div>'+

function wireDrag(){
  var list=$('#reList'),dragEl=null;
  $$('.ritem',list).forEach(function(it){
    it.addEventListener('dragstart',function(){dragEl=it;it.classList.add('dragging')});
    it.addEventListener('dragend',function(){it.classList.remove('dragging');$$('.ritem',list).forEach(function(x){x.classList.remove('over')});commitOrder()});
    it.addEventListener('dragover',function(e){e.preventDefault();
      var after=e.clientY>it.getBoundingClientRect().top+it.offsetHeight/2;
      $$('.ritem',list).forEach(function(x){x.classList.remove('over')});it.classList.add('over');
      if(it!==dragEl){list.insertBefore(dragEl,after?it.nextSibling:it)}});
  });
  function commitOrder(){var ids=$$('.ritem',list).map(function(x){return +x.dataset.i});
    state.content.projects=ids.map(function(i){return state.content.projects[i]});setDirty(true);renderReorder();}
}

function showTourStep(){

    document.body.appendChild(tourBox);}
  var spot=$('.spot',tourBox),pop=$('.pop',tourBox);
  spot.style.top=(r.top-6)+'px';spot.style.left=(r.left-6)+'px';spot.style.width=(r.width+12)+'px';spot.style.height=(r.height+12)+'px';
  pop.innerHTML='<h4 style="color:var(--teal-dark);font-size:15px;margin-bottom:6px">'+esc(step.title)+'</h4>'+
    '<p style="font-size:13.5px;color:var(--dark);line-height:1.55;margin-bottom:14px">'+esc(step.text)+'</p>'+
    '<div style="display:flex;align-items:center;justify-content:space-between"><span style="font-size:12px;color:var(--muted)">Step '+(tourIdx+1)+' of '+TOUR.length+'</span>'+
    '<div style="display:flex;gap:8px"><button class="btn btn-ghost btn-sm" data-skip>Skip</button><button class="btn btn-primary btn-sm" data-next>'+(tourIdx===TOUR.length-1?'Got it':'Next')+'</button></div></div>';
  var top=r.top+r.height+14;if(top+150>window.innerHeight)top=Math.max(14,r.top-160);
  pop.style.top=top+'px';pop.style.left=Math.min(Math.max(14,r.left),window.innerWidth-320)+'px';
  $('[data-skip]',pop).onclick=endTour;
  $('[data-next]',pop).onclick=function(){if(tourIdx<TOUR.length-1){tourIdx++;showTourStep()}else endTour()};
}
$('#helpBtn').addEventListener('click',startTour);

/* ═══════════ BOOT ═══════════ */
function loadContent(){
  return api.getContent().then(function(c){
    if(!c.projects)c.projects=[];if(!c.sections)c.sections={};
    c.projects.forEach(function(p){if(!p.images)p.images=[];if(!p.scope)p.scope=[]});
    // Pre-fill the service-card editor with the live defaults when none are saved yet.
    if(!Array.isArray(c.services)||!c.services.length)c.services=JSON.parse(JSON.stringify(SERVICE_DEFAULTS));
    state.content=c;
  });
}
function boot(){
  api.me().then(function(){
    showApp();resetIdle();
    loadContent().then(function(){
      go('dashboard');
      try{if(localStorage.getItem('ies_tour_done')!=='3')setTimeout(startTour,600)}catch(e){}
    });
  }).catch(showLogin);
}
boot();
})();
</script>
